services:

  db:
    image: postgres:15
    container_name: 2roots_db
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5436:5432"
    networks:
      - 2roots_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: 2roots_redis
    ports:
      - "6381:6379"
    networks:
      - 2roots_network

  backend:
    build: ./backend
    container_name: 2roots_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8081:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - 2roots_network

  frontend:
    build: ./frontend
    container_name: 2roots_frontend
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5200:5173"
    networks:
      - 2roots_network

volumes:
  postgres_data:

networks:
  2roots_network:
    driver: bridge